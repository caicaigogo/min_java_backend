# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /

spring:
  application:
    name: SOFABoot Demo
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/ry
    username: root
    password: mysql-password
    driver-class-name: com.mysql.cj.jdbc.Driver

# 日志配置
logging:
  file:
    path: ./logs

# Shiro
shiro:
  user:
    # 首页地址
    indexUrl: /index
    # 登录地址
    loginUrl: /login

  rememberMe:
    # 是否开启记住我
    enabled: true

# MyBatis
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.admin.project.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath:mybatis/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml
